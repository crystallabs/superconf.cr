name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
      - name: Install dependencies
        run: shards install
      - name: Run specs
        run: crystal spec
      - name: Check formatting
        run: crystal tool format --check
      - name: Lint (ameba)
        run: ./bin/ameba
